spring.datasource.url=jdbc:h2:mem:cursos-online-test;MODE=LEGACY;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.rabbitmq.listener.simple.auto-startup=false
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/common/v2.0
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
aws.region=us-east-1
aws.s3.bucket=cursos-online-test
rabbitmq.exchange.evaluaciones=exchange.evaluaciones
rabbitmq.exchange.errores=exchange.evaluaciones.errores
rabbitmq.queue.evaluaciones=cola.evaluaciones.pendientes
rabbitmq.queue.evaluaciones.errores=cola.evaluaciones.errores
rabbitmq.routing.evaluacion.rendida=evaluacion.rendida
rabbitmq.routing.evaluacion.error=evaluacion.error
