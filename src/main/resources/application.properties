spring.application.name=gestion-cursos-online
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/cursos-online-db}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.h2.console.enabled=true

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

rabbitmq.exchange.evaluaciones=${RABBITMQ_EXCHANGE_EVALUACIONES:exchange.evaluaciones}
rabbitmq.exchange.errores=${RABBITMQ_EXCHANGE_ERRORES:exchange.evaluaciones.errores}
rabbitmq.queue.evaluaciones=${RABBITMQ_QUEUE_EVALUACIONES:cola.evaluaciones.pendientes}
rabbitmq.queue.evaluaciones.errores=${RABBITMQ_QUEUE_EVALUACIONES_ERRORES:cola.evaluaciones.errores}
rabbitmq.routing.evaluacion.rendida=${RABBITMQ_ROUTING_EVALUACION_RENDIDA:evaluacion.rendida}
rabbitmq.routing.evaluacion.error=${RABBITMQ_ROUTING_EVALUACION_ERROR:evaluacion.error}

aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${S3_BUCKET:cursos-online-demo}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_AD_B2C_ISSUER_URI:https://login.microsoftonline.com/common/v2.0}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_AD_B2C_JWK_SET_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
