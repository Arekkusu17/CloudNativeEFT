name: build-and-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Build image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gestion-cursos-online:latest .

      - name: Login DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push DockerHub
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/gestion-cursos-online:latest

      - name: Deploy EC2
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gestion-cursos-online:latest
            docker stop gestion-cursos-online || true
            docker rm gestion-cursos-online || true
            docker run -d --name gestion-cursos-online -p 8080:8080 \
              --env-file /home/${{ secrets.EC2_USER }}/gestion-cursos-online/.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/gestion-cursos-online:latest
